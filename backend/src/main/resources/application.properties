spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lolstats}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:lol_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:lol_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

ddragon.base-url=https://ddragon.leagueoflegends.com
ddragon.champion-version=15.10.1
